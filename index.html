<script>
(function() {
    // ==================== 导航 ====================
    var navBtns = document.querySelectorAll('.nav-btn');
    var pages = document.querySelectorAll('.page');
    navBtns.forEach(function(btn) {
        btn.onclick = function() {
            var target = this.getAttribute('data-page');
            navBtns.forEach(function(b) { b.classList.remove('active'); });
            this.classList.add('active');
            pages.forEach(function(p) { p.classList.remove('active'); });
            var pageEl = document.getElementById('page-' + target);
            if (pageEl) pageEl.classList.add('active');
            if (target === 'timer') updateTimerDisplay();
            if (target === 'growth') renderGrowthHistory();
            if (target === 'home') { renderGrid(); renderTodayPlan(); } // 切换回主页时刷新状态
            if (target === 'plan') initCyclePage();
        };
    });

    // ==================== 主页：自动打卡逻辑 ====================
    var DAYS = ['周一','周二','周三','周四','周五','周六','周日'];
    // weekData 存储格式：每个元素可以是 true(已打卡), false(未打，且今天或未来), 'missed'(已错过)
    var weekData = JSON.parse(localStorage.getItem('weekCheckData') || '[false,false,false,false,false,false,false]');

    function getWeekDates() {
        var today = new Date();
        var diff = today.getDay() === 0 ? 6 : today.getDay() - 1;
        var monday = new Date(today);
        monday.setDate(today.getDate() - diff);
        var dates = [];
        for (var i = 0; i < 7; i++) {
            var d = new Date(monday);
            d.setDate(monday.getDate() + i);
            dates.push(d);
        }
        return dates;
    }

    // 核心：根据当前时间更新本周打卡状态
    function updateWeekStatus() {
        var dates = getWeekDates();
        var today = new Date();
        today.setHours(0,0,0,0);

        for (var i = 0; i < 7; i++) {
            var dayDate = new Date(dates[i]);
            dayDate.setHours(0,0,0,0);
            // 如果这一天已经过了（dayDate < today），且当前状态不是 true（已打卡），则标记为错过
            if (dayDate < today) {
                if (weekData[i] !== true) {
                    weekData[i] = 'missed';
                }
            }
            // 如果是今天或未来，保持原有状态（true 或 false），但如果是 'missed' 则重置为 false（防止未来被锁定）
            else {
                if (weekData[i] === 'missed') weekData[i] = false;
            }
        }
        localStorage.setItem('weekCheckData', JSON.stringify(weekData));
    }

    function countCheckDays() {
        var count = 0;
        for (var i = 0; i < weekData.length; i++) {
            if (weekData[i] === true) count++;
        }
        return count;
    }

    function renderGrid() {
        // 每次渲染前更新状态
        updateWeekStatus();

        var grid = document.getElementById('grid');
        if (!grid) return;
        var dates = getWeekDates();
        grid.innerHTML = '';
        for (var i = 0; i < DAYS.length; i++) {
            (function(index) {
                var status = weekData[index];
                var d = dates[index];
                var cell = document.createElement('div');
                cell.className = 'cell';

                // 状态图标
                var iconText = '⭕';
                if (status === true) iconText = '✅';
                else if (status === 'missed') iconText = '❌';

                // 按钮文字与样式
                var btnText = '打卡';
                var btnClass = 'check';
                if (status === true) { btnText = '已打卡'; btnClass = 'check done'; }
                else if (status === 'missed') { btnText = '已错过'; btnClass = 'check'; }

                cell.innerHTML = '<div class="day">' + DAYS[index] + '</div>' +
                    '<div class="date">' + (d.getMonth()+1) + '/' + d.getDate() + '</div>' +
                    '<span class="icon">' + iconText + '</span>' +
                    '<button class="' + btnClass + '">' + btnText + '</button>';

                var button = cell.querySelector('button');
                // 只有未打且未错过的今天/未来日子才能点击
                if (status === false) {
                    button.onclick = function() {
                        weekData[index] = true;
                        localStorage.setItem('weekCheckData', JSON.stringify(weekData));
                        renderGrid();
                    };
                } else if (status === 'missed') {
                    button.disabled = true;
                }

                grid.appendChild(cell);
            })(i);
        }

        // 更新底部总打卡天数显示
        updateStatsDisplay();
    }

    function updateInfo() {
        var now = new Date();
        var wd = ['星期日','星期一','星期二','星期三','星期四','星期五','星期六'];
        var dateEl = document.getElementById('nowDate');
        if (dateEl) dateEl.textContent = '📅 ' + now.getFullYear() + '年' + (now.getMonth()+1) + '月' + now.getDate() + '日 ' + wd[now.getDay()];
        var startStr = localStorage.getItem('startDate') || '2026-04-20';
        var start = new Date(startStr + 'T00:00:00');
        var today = new Date(now.getFullYear(), now.getMonth(), now.getDate());
        var days = Math.floor((today - start) / 86400000) + 1;
        var counter = document.getElementById('counter');
        if (counter) counter.textContent = '我已低调变好 ' + days + ' 天';
    }

    // 新增：显示本周打卡统计
    function updateStatsDisplay() {
        var statsEl = document.getElementById('weekStats');
        if (!statsEl) {
            // 动态创建统计区域
            var gridParent = document.getElementById('grid').parentNode;
            statsEl = document.createElement('div');
            statsEl.id = 'weekStats';
            statsEl.style.textAlign = 'center';
            statsEl.style.marginTop = '12px';
            statsEl.style.fontSize = '0.85em';
            statsEl.style.color = 'var(--text-light)';
            gridParent.appendChild(statsEl);
        }
        var count = countCheckDays();
        statsEl.textContent = '本周已打卡 ' + count + ' / 7 天';
    }

    function getCurrentCycleDay() {
        var cycleStartStr = localStorage.getItem('cycleStartDate') || localStorage.getItem('startDate') || '2026-04-20';
        var start = new Date(cycleStartStr + 'T00:00:00');
        var today = new Date(); today.setHours(0,0,0,0);
        var diffDays = Math.floor((today - start) / 86400000);
        var cycleDays = parseInt(localStorage.getItem('cycleDays') || '4');
        var dayInCycle = (diffDays % cycleDays);
        if (dayInCycle < 0) dayInCycle += cycleDays;
        return { dayIndex: dayInCycle, cycleDays: cycleDays, startDate: cycleStartStr };
    }

    function renderTodayPlan() {
        var cycleData = JSON.parse(localStorage.getItem('cyclePlanData') || '[]');
        var cycleInfo = getCurrentCycleDay();
        var dayIndex = cycleInfo.dayIndex;
        var contentEl = document.getElementById('todayPlanContent');
        if (!contentEl) return;
        if (cycleData.length === 0 || dayIndex >= cycleData.length) {
            contentEl.innerHTML = '<span class="plan-empty">暂无训练计划，去「🔄 计划」页面设置循环吧</span>';
            return;
        }
        var todayCycle = cycleData[dayIndex];
        var titleEl = document.querySelector('#todayPlanBox h3');
        if (titleEl) titleEl.textContent = '📌 今日训练计划 · 循环第 ' + (dayIndex + 1) + ' 天';
        if (todayCycle.isRest) {
            contentEl.innerHTML = '<div style="color:#1976d2; font-weight:500;">😴 今日休息</div>';
        } else {
            var part = todayCycle.部位 || '';
            var action = todayCycle.动作 || '';
            if (!part && !action) {
                contentEl.innerHTML = '<span class="plan-empty">今日暂无安排，去计划页填写内容</span>';
            } else {
                var html = '';
                if (part) html += '<div style="margin-bottom:4px;"><strong>训练部位：</strong>' + part + '</div>';
                if (action) html += '<div><strong>动作列表：</strong>' + action + '</div>';
                contentEl.innerHTML = html;
            }
        }
    }

    document.getElementById('startBtn').onclick = function() {
        var picker = document.getElementById('picker');
        picker.style.display = (picker.style.display === 'none' || picker.style.display === '') ? 'flex' : 'none';
        if (picker.style.display === 'flex') document.getElementById('dateInput').value = localStorage.getItem('startDate') || '2026-04-20';
    };
    document.getElementById('saveBtn').onclick = function() {
        var val = document.getElementById('dateInput').value;
        if (val) { localStorage.setItem('startDate', val); updateInfo(); document.getElementById('picker').style.display = 'none'; }
    };
    document.getElementById('resetBtn').onclick = function() {
        if (confirm('确定要重置本周所有打卡记录吗？')) {
            weekData = [false,false,false,false,false,false,false];
            localStorage.setItem('weekCheckData', JSON.stringify(weekData));
            renderGrid();
        }
    };

    // 初始化主页
    updateInfo();
    renderGrid();
    renderTodayPlan();

    // ==================== 循环训练计划 ====================
    var cyclePlanData = JSON.parse(localStorage.getItem('cyclePlanData') || '[]');
    var cycleDays = parseInt(localStorage.getItem('cycleDays') || '4');
    var cycleStartDate = localStorage.getItem('cycleStartDate') || localStorage.getItem('startDate') || '2026-04-20';

    function initCyclePage() {
        document.getElementById('cycleDaysInput').value = cycleDays;
        renderCycleTable();
    }

    function renderCycleTable() {
        var tbody = document.getElementById('cycleBody');
        if (!tbody) return;
        while (cyclePlanData.length < cycleDays) cyclePlanData.push({ isRest:false, 部位:'', 动作:'' });
        while (cyclePlanData.length > cycleDays) cyclePlanData.pop();
        var todayInfo = getCurrentCycleDay();
        var todayIndex = todayInfo.dayIndex;
        tbody.innerHTML = '';
        for (var i = 0; i < cycleDays; i++) {
            (function(index) {
                var dayData = cyclePlanData[index];
                var tr = document.createElement('tr');
                if (index === todayIndex) tr.className = 'today-row';
                tr.innerHTML = '<td>第' + (index+1) + '天' + (index===todayIndex?' ⬅':'') + '</td>' +
                    '<td><span class="rest-day-tag' + (dayData.isRest?' active':'') + '">' + (dayData.isRest?'休息':'训练') + '</span></td>' +
                    '<td><input type="text" placeholder="' + (dayData.isRest?'':'如：胸+三头') + '" value="' + (dayData.部位||'') + '" ' + (dayData.isRest?'disabled':'') + '></td>' +
                    '<td><input type="text" placeholder="' + (dayData.isRest?'':'如：卧推 5x5') + '" value="' + (dayData.动作||'') + '" ' + (dayData.isRest?'disabled':'') + '></td>';
                tr.querySelector('.rest-day-tag').onclick = function() {
                    cyclePlanData[index].isRest = !cyclePlanData[index].isRest;
                    renderCycleTable();
                };
                var inputs = tr.querySelectorAll('input');
                if (inputs.length >= 2) {
                    inputs[0].oninput = function() { cyclePlanData[index].部位 = this.value; };
                    inputs[1].oninput = function() { cyclePlanData[index].动作 = this.value; };
                }
                tbody.appendChild(tr);
            })(i);
        }
        var infoEl = document.getElementById('cycleInfo');
        if (infoEl) infoEl.textContent = '📍 今日：第 ' + (todayIndex + 1) + ' 天 / 共 ' + cycleDays + ' 天循环';
    }

    document.getElementById('applyCycleBtn').onclick = function() {
        var newDays = parseInt(document.getElementById('cycleDaysInput').value);
        if (isNaN(newDays) || newDays < 1 || newDays > 14) return alert('循环天数请设置在 1-14 之间');
        cycleDays = newDays;
        localStorage.setItem('cycleDays', cycleDays);
        while (cyclePlanData.length < cycleDays) cyclePlanData.push({ isRest:false, 部位:'', 动作:'' });
        while (cyclePlanData.length > cycleDays) cyclePlanData.pop();
        localStorage.setItem('cyclePlanData', JSON.stringify(cyclePlanData));
        renderCycleTable();
    };
    document.getElementById('saveCycleBtn').onclick = function() {
        localStorage.setItem('cyclePlanData', JSON.stringify(cyclePlanData));
        localStorage.setItem('cycleDays', cycleDays);
        alert('循环计划已保存！');
        renderTodayPlan();
    };
    document.getElementById('resetCycleBtn').onclick = function() {
        var todayStr = new Date().toISOString().split('T')[0];
        if (confirm('将循环起始日重置为今天（' + todayStr + '）？\n今天将成为循环第 1 天。')) {
            cycleStartDate = todayStr;
            localStorage.setItem('cycleStartDate', cycleStartDate);
            renderCycleTable();
            renderTodayPlan();
            alert('已重置！今天起为循环第 1 天。');
        }
    };

    // ==================== 计时器 ====================
    var timerSeconds = 0, timerInterval = null, timerRunning = false;

    function updateTimerDisplay() {
        var display = document.getElementById('timerDisplay');
        if (!display) return;
        var min = Math.floor(timerSeconds / 60), sec = timerSeconds % 60;
        display.textContent = (min < 10 ? '0' + min : min) + ':' + (sec < 10 ? '0' + sec : sec);
    }

    function stopTimer() {
        if (timerInterval) { clearInterval(timerInterval); timerInterval = null; }
        timerRunning = false;
    }

    function playBeepSequence() {
        try {
            var AudioContext = window.AudioContext || window.webkitAudioContext;
            if (!AudioContext) { if (navigator.vibrate) navigator.vibrate([100,80,100,80,100]); return; }
            var ctx = new AudioContext();
            var now = ctx.currentTime;
            for (var i = 0; i < 3; i++) {
                var osc = ctx.createOscillator();
                var gain = ctx.createGain();
                osc.type = 'sine';
                osc.frequency.value = 1000;
                var t = now + i * 0.1;
                gain.gain.setValueAtTime(0.3, t);
                gain.gain.exponentialRampToValueAtTime(0.001, t + 0.1);
                osc.connect(gain);
                gain.connect(ctx.destination);
                osc.start(t);
                osc.stop(t + 0.1);
            }
            setTimeout(function() { ctx.close(); }, 800);
        } catch(e) {}
        if (navigator.vibrate) navigator.vibrate([100,80,100,80,100]);
    }

    document.getElementById('timerStartBtn').onclick = function() {
        if (timerRunning || timerSeconds <= 0) return;
        timerRunning = true;
        timerInterval = setInterval(function() {
            if (timerSeconds > 0) { timerSeconds--; updateTimerDisplay(); }
            if (timerSeconds <= 0) { stopTimer(); updateTimerDisplay(); playBeepSequence(); }
        }, 1000);
    };
    document.getElementById('timerPauseBtn').onclick = function() { stopTimer(); updateTimerDisplay(); };
    document.getElementById('timerResetBtn').onclick = function() { stopTimer(); timerSeconds = 0; updateTimerDisplay(); };
    document.querySelectorAll('.preset-btn').forEach(function(btn) {
        btn.onclick = function() { stopTimer(); timerSeconds = parseInt(this.getAttribute('data-seconds')); updateTimerDisplay(); };
    });
    updateTimerDisplay();

    // ==================== 成长页 ====================
    var currentMetric = 'weight';
    var metricNames = { weight:'体重(kg)', chest:'胸围(cm)', arm:'臂围(cm)', waist:'腰围(cm)', bodyfat:'体脂(%)' };

    function getGrowthData() {
        try { return JSON.parse(localStorage.getItem('growthData') || '{}'); } catch(e) { return {}; }
    }
    function saveGrowthData(data) { localStorage.setItem('growthData', JSON.stringify(data)); }

    document.querySelectorAll('.metric-tag').forEach(function(tag) {
        tag.onclick = function() {
            document.querySelectorAll('.metric-tag').forEach(function(t) { t.classList.remove('active'); });
            this.classList.add('active');
            currentMetric = this.getAttribute('data-metric');
            renderGrowthHistory();
        };
    });

    var todayStr = new Date().toISOString().split('T')[0];
    var growthDateInput = document.getElementById('growthDate');
    if (growthDateInput) growthDateInput.value = todayStr;

    function renderGrowthHistory() {
        var data = getGrowthData();
        var records = (data[currentMetric] || []).slice();
        records.sort(function(a, b) { return b.date.localeCompare(a.date); });
        var tbody = document.getElementById('historyBody');
        var trendInfo = document.getElementById('trendInfo');
        if (!tbody) return;
        tbody.innerHTML = '';
        if (records.length === 0) {
            tbody.innerHTML = '<tr><td colspan="4" style="color:var(--text-light); padding:20px;">暂无记录</td></tr>';
            if (trendInfo) trendInfo.textContent = '';
            return;
        }
        var latest = records[0].value;
        var previous = records.length > 1 ? records[1].value : null;
        if (trendInfo && previous !== null) {
            var diff = (latest - previous).toFixed(1);
            var unit = currentMetric === 'bodyfat' ? '%' : '';
            var trendText = '最新变化（较上次）：';
            if (diff > 0) trendText += '<span class="trend-up">↑ +' + diff + unit + '</span>';
            else if (diff < 0) trendText += '<span class="trend-down">↓ ' + diff + unit + '</span>';
            else trendText += '<span class="trend-stable">→ 持平</span>';
            trendInfo.innerHTML = trendText;
        } else if (trendInfo) {
            trendInfo.textContent = '至少需要两次记录才能看到趋势';
        }
        for (var i = 0; i < records.length; i++) {
            (function(index) {
                var r = records[index];
                var tr = document.createElement('tr');
                var unit = currentMetric === 'bodyfat' ? '%' : '';
                var changeHtml = '-';
                if (index < records.length - 1) {
                    var change = (r.value - records[index + 1].value).toFixed(1);
                    if (change > 0) changeHtml = '<span class="trend-up">+' + change + unit + '</span>';
                    else if (change < 0) changeHtml = '<span class="trend-down">' + change + unit + '</span>';
                    else changeHtml = '<span class="trend-stable">0</span>';
                }
                tr.innerHTML = '<td>' + r.date + '</td><td>' + r.value + unit + '</td><td>' + changeHtml + '</td><td><button class="del-btn">✕</button></td>';
                tr.querySelector('.del-btn').onclick = function() {
                    var records2 = (getGrowthData()[currentMetric] || []).slice();
                    records2.sort(function(a, b) { return b.date.localeCompare(a.date); });
                    records2.splice(index, 1);
                    var allData = getGrowthData();
                    allData[currentMetric] = records2;
                    saveGrowthData(allData);
                    renderGrowthHistory();
                };
                tbody.appendChild(tr);
            })(i);
        }
    }

    document.getElementById('growthAddBtn').onclick = function() {
        var value = parseFloat(document.getElementById('growthValue').value);
        var date = document.getElementById('growthDate').value;
        if (isNaN(value) || !date) return alert('请输入有效的数值和日期');
        var data = getGrowthData();
        if (!data[currentMetric]) data[currentMetric] = [];
        var found = false;
        for (var i = 0; i < data[currentMetric].length; i++) {
            if (data[currentMetric][i].date === date) { data[currentMetric][i].value = value; found = true; break; }
        }
        if (!found) data[currentMetric].push({ date: date, value: value });
        saveGrowthData(data);
        document.getElementById('growthValue').value = '';
        renderGrowthHistory();
    };
    document.getElementById('clearGrowthBtn').onclick = function() {
        if (confirm('确定要清空「' + metricNames[currentMetric] + '」的所有记录吗？')) {
            var data = getGrowthData();
            data[currentMetric] = [];
            saveGrowthData(data);
            renderGrowthHistory();
        }
    };
    renderGrowthHistory();
})();
</script>
